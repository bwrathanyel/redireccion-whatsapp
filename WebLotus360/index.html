<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotus 360 - Cotiza tu Viaje</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://raw.githubusercontent.com/bwrathanyel/redireccion-whatsapp/main/lotus360background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            color: #fff;
        }

        @supports not (backdrop-filter: blur(1px)) {
            .card { background: rgba(15, 15, 15, 0.85); }
        }

        .logo-profile {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff9100;
            margin-bottom: 10px;
            object-fit: cover;
        }

        h2 { color: #fff; margin-bottom: 4px; }

        .subtitle {
            color: #ffd9a8;
            font-size: 14px;
            margin-bottom: 18px;
        }

        /* --- Caja de noches (elemento distintivo) --- */
        .noches-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 4px 0 15px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #ffd9a8;
            min-height: 20px;
        }
        .noches-box i { color: #ff9100; }
        .noches-box .num { color: #fff; font-size: 16px; }

        .form-group { margin-bottom: 15px; text-align: left; }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #fff;
            font-size: 14px;
            letter-spacing: .3px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.92);
            color: #222;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #ff9100;
            box-shadow: 0 0 0 3px rgba(255, 145, 0, 0.25);
        }

        .extra-input { margin-top: 10px; }

        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }

        .hint {
            font-size: 12px;
            color: #ffd9a8;
            margin-top: 6px;
            line-height: 1.4;
            display: block;
        }

        .info-box {
            display: none;
            background: rgba(255, 145, 0, 0.12);
            border: 1px solid rgba(255, 145, 0, 0.4);
            color: #ffe3bd;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
            text-align: left;
            margin-top: 10px;
            line-height: 1.4;
        }
        .info-box i { margin-right: 6px; }

        .btn-gen {
            width: 100%;
            padding: 15px;
            background: #ff9100;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease;
            margin-top: 5px;
        }

        .btn-gen:active { transform: scale(0.98); }

        .btn-gen:disabled {
            background: #c97300;
            cursor: not-allowed;
            opacity: 0.85;
        }

        .error-msg {
            display: none;
            background: rgba(255, 70, 70, 0.15);
            border: 1px solid rgba(255, 90, 90, 0.5);
            color: #ffd6d6;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
            text-align: left;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        #resultado {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 15px;
            border-left: 5px solid #25D366;
            text-align: left;
        }

        #resultado b { color: #ffd9a8; }

        .wa-btn {
            display: block;
            text-align: center;
            background: #25D366;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            font-size: 16px;
        }

        .wa-btn i { margin-right: 6px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://bwrathanyel.github.io/redireccion-whatsapp/logolotus.png" class="logo-profile" alt="Lotus 360">
    <h2>Destinos y Eventos Lotus 360</h2>
    <p class="subtitle">¡Escápate con Nosotros!</p>

    <div id="error-box" class="error-msg"></div>

    <div class="form-group">
        <label>Destino</label>
        <select id="destino" onchange="toggleExtranjero()">
            <option>Isla de Margarita</option>
            <option>Morrocoy</option>
            <option>Los Roques</option>
            <option>Mérida</option>
            <option>Canaima</option>
            <option>Catacumbo</option>
            <option value="Extranjero">Viajar al Extranjero</option>
        </select>
    </div>

    <div id="div-extranjero" class="form-group" style="display:none;">
        <label>¿A qué país/ciudad desea viajar?</label>
        <input type="text" id="input-extranjero" placeholder="Escriba el destino...">
    </div>

    <div class="form-group">
        <label>Tipo de Hospedaje</label>
        <select id="hospedaje">
            <option>Hotel</option>
            <option>Apartamento</option>
            <option>Posada</option>
        </select>
    </div>

    <div class="form-group">
        <label>Plan de alimentación</label>
        <select id="plan-alimentacion">
            <option value="Solo Alojamiento">Solo Alojamiento</option>
            <option value="Desayuno Incluido">Desayuno Incluido</option>
            <option value="Todo Incluido">Todo Incluido</option>
            <option value="No sé / quiero opciones">No sé, quiero opciones</option>
        </select>
    </div>

    <div class="form-group">
        <label>¿Es una ocasión especial?</label>
        <select id="ocasion" onchange="toggleOcasionInfo()">
            <option value="Vacaciones">Vacaciones regulares</option>
            <option value="Luna de Miel / Aniversario">Luna de Miel o Aniversario</option>
            <option value="Cumpleaños">Cumpleaños</option>
            <option value="Viaje de Negocios">Viaje de Negocios</option>
            <option value="Otro">Otro</option>
        </select>
        <div id="info-ocasion" class="info-box">
            <i class="fas fa-gift"></i>¡Genial! Le avisaremos al hospedaje para que preparen un detalle especial para tu llegada 🎉
        </div>
    </div>

    <div class="form-group">
        <label>¿Cómo llegarás a tu destino?</label>
        <select id="transporte" onchange="toggleTransporte()">
            <option value="Vehículo propio">Vehículo propio</option>
            <option value="Transporte terrestre">Transporte terrestre (necesito que me ayuden a coordinar)</option>
            <option value="Vuelo">Vuelo (necesito boleto aéreo)</option>
            <option value="No sé aún">Aún no sé</option>
        </select>
        <input type="text" id="origen-vuelo" class="extra-input" placeholder="¿Desde qué ciudad volarías?" style="display:none;">
        <div id="info-transporte" class="info-box">
            <i class="fas fa-plane"></i>Perfecto, tu asesor te armará una cotización conjunta de hospedaje + boleto aéreo.
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>Check-in</label>
            <input type="date" id="checkin" onchange="ajustarCheckout()">
        </div>
        <div class="form-group">
            <label>Check-out</label>
            <input type="date" id="checkout" onchange="actualizarNoches()">
        </div>
    </div>

    <div class="noches-box" id="noches-box">
        <i class="fas fa-moon"></i>
        <span>Selecciona tus fechas para ver la duración</span>
    </div>

    <div class="form-group">
        <label>Adultos</label>
        <select id="adultos" onchange="toggleAdultosExtra()">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="more">Más de 4</option>
        </select>
        <input type="number" id="adultos-extra" class="extra-input" min="5" max="50" placeholder="¿Cuántos adultos en total?" style="display:none;">
    </div>

    <div class="form-group">
        <label>Niños</label>
        <select id="ninos" onchange="toggleNinosExtra()">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="more">Más de 3</option>
        </select>
        <input type="number" id="ninos-extra" class="extra-input" min="4" max="50" placeholder="¿Cuántos niños en total?" style="display:none;" oninput="actualizarEdades(); actualizarSugerenciaHabitaciones();">
    </div>

    <div id="contenedor-edades"></div>

    <div class="form-group">
        <label>Número de habitaciones</label>
        <select id="habitaciones" onchange="toggleHabitacionesExtra()">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="more">Más de 5</option>
        </select>
        <input type="number" id="habitaciones-extra" class="extra-input" min="6" max="50" placeholder="¿Cuántas habitaciones necesitas?" style="display:none;">
        <span class="hint" id="sugerencia-habitaciones"></span>
    </div>

    <button class="btn-gen" id="btn-generar" onclick="generar()">Generar Solicitud de Cotización</button>

    <div id="resultado">
        <p id="res-texto" style="margin-bottom:10px;"></p>
        <a id="btn-wa" href="#" target="_blank" rel="noopener" class="wa-btn"><i class="fab fa-whatsapp"></i> Contactar Asesor</a>
    </div>
</div>

<script>
    // Tope de campos de edad que se renderizan individualmente.
    // Si el grupo es más grande, se pide el rango de edades en un solo campo.
    const MAX_EDADES_INDIVIDUALES = 10;

    function hoyISO() {
        const d = new Date();
        return d.toISOString().split('T')[0];
    }

    // Fecha mínima = hoy, para evitar cotizaciones con fechas pasadas
    document.getElementById('checkin').min = hoyISO();
    document.getElementById('checkout').min = hoyISO();

    function ajustarCheckout() {
        const checkin = document.getElementById('checkin');
        const checkout = document.getElementById('checkout');
        checkout.min = checkin.value || hoyISO();
        // Si el checkout quedó antes que el nuevo checkin, lo limpiamos
        if (checkout.value && checkout.value < checkin.value) {
            checkout.value = '';
        }
        actualizarNoches();
    }

    // --- Caja de noches (cuenta automáticamente la duración de la estadía) ---
    function actualizarNoches() {
        const checkin = document.getElementById('checkin').value;
        const checkout = document.getElementById('checkout').value;
        const box = document.getElementById('noches-box');

        if (!checkin || !checkout) {
            box.innerHTML = '<i class="fas fa-moon"></i><span>Selecciona tus fechas para ver la duración</span>';
            return;
        }

        const dIn = new Date(checkin);
        const dOut = new Date(checkout);
        const dias = Math.round((dOut - dIn) / (1000 * 60 * 60 * 24));

        if (dias <= 0) {
            box.innerHTML = '<i class="fas fa-sun"></i><span>Pasadía (mismo día) — confírmalo con tu asesor</span>';
        } else {
            box.innerHTML = `<i class="fas fa-moon"></i><span><span class="num">${dias}</span> noche${dias > 1 ? 's' : ''} de estadía</span>`;
        }
    }

    function toggleExtranjero() {
        const dest = document.getElementById('destino').value;
        document.getElementById('div-extranjero').style.display = (dest === 'Extranjero') ? 'block' : 'none';
    }

    // --- Ocasión especial ---
    function toggleOcasionInfo() {
        const ocasion = document.getElementById('ocasion').value;
        const info = document.getElementById('info-ocasion');
        const especiales = ['Luna de Miel / Aniversario', 'Cumpleaños'];
        info.style.display = especiales.includes(ocasion) ? 'block' : 'none';
    }

    // --- Transporte ---
    function toggleTransporte() {
        const transporte = document.getElementById('transporte').value;
        const origenVuelo = document.getElementById('origen-vuelo');
        const info = document.getElementById('info-transporte');
        const esVuelo = transporte === 'Vuelo';
        origenVuelo.style.display = esVuelo ? 'block' : 'none';
        info.style.display = esVuelo ? 'block' : 'none';
        if (!esVuelo) origenVuelo.value = '';
    }

    function toggleAdultosExtra() {
        const sel = document.getElementById('adultos');
        const extra = document.getElementById('adultos-extra');
        extra.style.display = (sel.value === 'more') ? 'block' : 'none';
        if (sel.value !== 'more') extra.value = '';
        actualizarSugerenciaHabitaciones();
    }

    function toggleNinosExtra() {
        const sel = document.getElementById('ninos');
        const extra = document.getElementById('ninos-extra');
        extra.style.display = (sel.value === 'more') ? 'block' : 'none';
        if (sel.value !== 'more') extra.value = '';
        actualizarEdades();
        actualizarSugerenciaHabitaciones();
    }

    function toggleHabitacionesExtra() {
        const sel = document.getElementById('habitaciones');
        const extra = document.getElementById('habitaciones-extra');
        extra.style.display = (sel.value === 'more') ? 'block' : 'none';
        if (sel.value !== 'more') extra.value = '';
    }

    function getAdultosCount() {
        const sel = document.getElementById('adultos');
        if (sel.value === 'more') {
            const extra = parseInt(document.getElementById('adultos-extra').value, 10);
            return isNaN(extra) ? null : extra;
        }
        return parseInt(sel.value, 10);
    }

    function getNinosCount() {
        const sel = document.getElementById('ninos');
        if (sel.value === 'more') {
            const extra = parseInt(document.getElementById('ninos-extra').value, 10);
            return isNaN(extra) ? null : extra;
        }
        return parseInt(sel.value, 10);
    }

    function getHabitacionesCount() {
        const sel = document.getElementById('habitaciones');
        if (sel.value === 'more') {
            const extra = parseInt(document.getElementById('habitaciones-extra').value, 10);
            return isNaN(extra) ? null : extra;
        }
        return parseInt(sel.value, 10);
    }

    // --- Sugerencia de habitaciones según el tamaño del grupo (no obliga, solo orienta) ---
    function actualizarSugerenciaHabitaciones() {
        const ad = getAdultosCount();
        const ni = getNinosCount();
        const span = document.getElementById('sugerencia-habitaciones');
        const total = (ad || 0) + (ni || 0);

        if (total <= 0) {
            span.textContent = '';
            return;
        }
        const sugeridas = Math.max(1, Math.ceil(total / 4));
        span.innerHTML = `<i class="fas fa-lightbulb"></i> Sugerencia: ${sugeridas} habitación${sugeridas > 1 ? 'es' : ''} para ${total} persona${total > 1 ? 's' : ''} (puedes ajustarlo).`;
    }

    function actualizarEdades() {
        const n = getNinosCount();
        const cont = document.getElementById('contenedor-edades');
        cont.innerHTML = '';

        if (!n || n <= 0) return;

        if (n <= MAX_EDADES_INDIVIDUALES) {
            for (let i = 1; i <= n; i++) {
                cont.innerHTML += `<div class="form-group"><label>Edad Niño ${i}</label><input type="number" class="edad-input" min="0" max="17" placeholder="Años"></div>`;
            }
        } else {
            // Grupo grande: pedimos un resumen de edades en un solo campo en vez de saturar el formulario
            cont.innerHTML = `<div class="form-group"><label>Edades de los niños (resumen)</label><input type="text" id="edades-resumen" placeholder="Ej: 5 de 8 años, 5 de 3 años"></div>`;
        }
    }

    function mostrarError(msg) {
        const box = document.getElementById('error-box');
        box.innerHTML = msg;
        box.style.display = 'block';
        box.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function ocultarError() {
        document.getElementById('error-box').style.display = 'none';
    }

    function generar() {
        ocultarError();

        const destBase = document.getElementById('destino').value;
        const destExtra = document.getElementById('input-extranjero').value.trim();
        const dest = (destBase === 'Extranjero') ? destExtra : destBase;

        const hosp = document.getElementById('hospedaje').value;
        const planAlimentacion = document.getElementById('plan-alimentacion').value;
        const ocasion = document.getElementById('ocasion').value;
        const transporte = document.getElementById('transporte').value;
        const origenVuelo = document.getElementById('origen-vuelo').value.trim();
        const checkin = document.getElementById('checkin').value;
        const checkout = document.getElementById('checkout').value;

        const adultos = getAdultosCount();
        const ninos = getNinosCount();
        const habitaciones = getHabitacionesCount();

        // --- Validaciones ---
        const errores = [];

        if (destBase === 'Extranjero' && !destExtra) {
            errores.push('Indica a qué país o ciudad deseas viajar.');
        }
        if (!checkin) errores.push('Selecciona la fecha de check-in.');
        if (!checkout) errores.push('Selecciona la fecha de check-out.');
        if (checkin && checkout && checkout < checkin) {
            errores.push('La fecha de check-out no puede ser anterior al check-in.');
        }
        if (document.getElementById('adultos').value === 'more' && (adultos === null || adultos < 5)) {
            errores.push('Indica cuántos adultos viajan (mínimo 5 para esta opción).');
        }
        if (document.getElementById('ninos').value === 'more' && (ninos === null || ninos < 4)) {
            errores.push('Indica cuántos niños viajan (mínimo 4 para esta opción).');
        }
        if (document.getElementById('habitaciones').value === 'more' && (habitaciones === null || habitaciones
