<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotus 360 | Solicitud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; }
        .btn-gen { width: 100%; padding: 15px; background: #ff9100; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #resultado { display: none; margin-top: 20px; padding: 20px; background: #fff3e0; border-radius: 15px; border: 1px solid #ff9100; }
        .wa-btn { display: block; text-align: center; background: #25D366; color: white; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin-bottom:20px;">Lotus 360</h2>
    
    <div class="form-group">
        <label>Destino</label>
        <select id="destino">
            <option>Isla de Margarita</option>
            <option>Morrocoy</option>
            <option>Los Roques</option>
            <option>Mérida</option>
            <option>Chichiriviche</option>
            <option>Canaima</option>
            <option>Catacumbo</option>
            <option>Tucacas</option>
            <option>Viaje al Extranjero</option>
        </select>
    </div>

    <div class="form-group">
        <label>Adultos</label>
        <select id="adultos"><option>1</option><option>2</option><option>3</option><option>4</option></select>
    </div>

    <div class="form-group">
        <label>Niños</label>
        <select id="ninos" onchange="actualizarEdades()">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>
    </div>

    <div id="contenedor-edades"></div>

    <button class="btn-gen" onclick="generar()">Generar Solicitud de Cotización</button>

    <div id="resultado">
        <p id="res-texto" style="margin-bottom:10px;"></p>
        <a id="btn-wa" href="#" class="wa-btn"><i class="fab fa-whatsapp"></i> Contactar Asesor</a>
    </div>
</div>

<script>
    function actualizarEdades() {
        const n = document.getElementById('ninos').value;
        const cont = document.getElementById('contenedor-edades');
        cont.innerHTML = '';
        for(let i=1; i<=n; i++) {
            cont.innerHTML += `<div class="form-group"><label>Edad Niño ${i}</label><input type="number" class="edad-input" placeholder="Años"></div>`;
        }
    }

    function generar() {
        // Captura de datos
        const dest = document.getElementById('destino').value;
        const ad = document.getElementById('adultos').value;
        const ni = document.getElementById('ninos').value;
        
        let edades = "";
        const inputs = document.getElementsByClassName('edad-input');
        for(let i=0; i<inputs.length; i++) {
            edades += (i+1) + ": " + (inputs[i].value || "N/A") + " años, ";
        }

        // ALEATORIZADOR: Se ejecuta al presionar el botón
        const asesores = [
            "584124119565", // Nicoll
            "584124119565", // Nicoll (duplicado)
            "584244248434", // Ambar
            "584244248434", // Ambar (duplicado)
            "584244136153"  // Luis
        ];
        const tlf = asesores[Math.floor(Math.random() * asesores.length)];
        
        // Formateo del mensaje
        const msg = `¡Hola! Quiero cotizar:%0ADestino: ${dest}%0AAdultos: ${ad}%0ANiños: ${ni}%0AEdades: ${edades}`;
        
        // Asignación al botón y visualización
        document.getElementById('btn-wa').href = `https://wa.me/${tlf}?text=${msg}`;
        document.getElementById('res-texto').innerHTML = `<b>Resumen:</b><br>${dest}<br>${ad} Adultos, ${ni} Niños<br>Edades: ${edades}`;
        document.getElementById('resultado').style.display = 'block';
    }
</script>

</body>
</html>
