<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotus 360 - Tu Próximo Destino</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://raw.githubusercontent.com/bwrathanyel/redireccion-whatsapp/main/lotus360background.jpg'); 
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* Capa de oscuridad suave para contraste */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 480px;
            z-index: 1;
            padding-bottom: 20px;
        }

        /* Encabezado */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-profile {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            border: 3px dashed #ff9100;
            padding: 5px;
            background-color: white;
            margin: 0 auto 15px auto;
            object-fit: contain;
            display: block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        
        .logo-profile:hover {
            transform: rotate(15deg) scale(1.05);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .tagline {
            font-size: 0.95rem;
            color: #f0f0f0;
            font-weight: 400;
            text-shadow: 0 2px 5px rgba(0,0,0,0.6);
        }

        /* Tarjeta Estilo Glassmorphism (Efecto Vidrio) */
        .booking-card {
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #2d3748;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.35);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* Línea decorativa naranja superior al estilo premium */
        .booking-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff9100, #ffb042);
        }

        .booking-card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1a202c;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }

        .booking-card h2 i {
            color: #ff9100;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #4a5568;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-icon-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 16px;
            color: #ff9100;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .form-control {
            width: 100%;
            padding: 13px 16px 13px 48px;
            border: 1.5px solid #e2e8f0;
            border-radius: 35px;
            font-size: 0.95rem;
            color: #2d3748;
            background-color: white;
            outline: none;
            transition: all 0.25s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            -webkit-appearance: none;
        }

        /* Animación de foco en inputs */
        .form-control:focus {
            border-color: #ff9100;
            box-shadow: 0 0 0 3px rgba(255, 145, 0, 0.15);
        }
        
        .form-control:focus + i {
            transform: scale(1.1);
        }

        /* Secciones Dinámicas Ocultas con Micro-animación */
        .hidden-section {
            display: none;
            opacity: 0;
            transform: translateY(-8px);
            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideDown {
            to { opacity: 1; transform: translateY(0); }
        }

        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* Botón Buscar Moderno */
        .btn-search {
            width: 100%;
            background: linear-gradient(135deg, #ff9100, #ffaa33);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 35px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 6px 16px rgba(255, 145, 0, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .btn-search:hover {
            box-shadow: 0 8px 20px rgba(255, 145, 0, 0.45);
        }

        .btn-search:active {
            transform: scale(0.97);
        }

        /* Caja de Resultados Estética */
        .result-box {
            display: none;
            margin-top: 22px;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-left: 5px solid #ff9100;
            border-radius: 16px;
            padding: 18px;
            text-align: left;
            animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box h3 {
            font-size: 1.1rem;
            color: #1a202c;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-box p {
            font-size: 0.9rem;
            color: #4a5568;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        /* Botón de WhatsApp Premium */
        .btn-action-final {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: linear-gradient(135deg, #25D366, #20ba5a);
            color: white;
            padding: 14px;
            border-radius: 35px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 6px 16px rgba(37, 211, 102, 0.3);
            transition: all 0.2s ease;
        }

        .btn-action-final:hover {
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
        }

        .btn-action-final:active {
            transform: scale(0.97);
        }

        /* Redes del footer */
        .footer-social {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 35px;
        }

        .footer-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: white;
            border-radius: 50%;
            font-size: 1.25rem;
