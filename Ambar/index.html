            background: #0f0e1a;
            color: #f0f0f5;

            padding: 0 0 80px 0;
            background-image: radial-gradient(ellipse at 20% 50%, #1a1833 0%, #0f0e1a 70%);
        }

        .header {
            padding: 28px 20px 16px;
            background: linear-gradient(180deg, rgba(15, 14, 26, 0.95) 60%, transparent);
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-badge {
            background: rgba(167, 139, 250, 0.15);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.7rem;
            color: #a78bfa;
            font-weight: 500;
            white-space: nowrap;
        }

        .header-sub {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 4px;
        }

        .header-sub p {
            color: #8888aa;
            font-size: 0.85rem;
        }

        .header-sub span {
            color: #c4b5fd;
            font-weight: 600;
        }

        .search-wrapper {
            padding: 0 20px 18px;
            position: sticky;
            top: 78px;
            z-index: 9;
            background: linear-gradient(180deg, #0f0e1a 70%, transparent);
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            opacity: 0.5;
            pointer-events: none;
        }

        .search-box input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            border-radius: 16px;
            border: 1.5px solid rgba(167, 139, 250, 0.15);
            background: rgba(26, 24, 51, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #f0f0f5;
            font-size: 1rem;
            font-weight: 400;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .search-box input::placeholder {
            color: #555577;
            font-weight: 300;
        }

        .search-box input:focus {
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 4px 30px rgba(124, 58, 237, 0.15), inset 0 0 0 1px rgba(167, 139, 250, 0.1);
            background: rgba(26, 24, 51, 0.95);
        }

        .search-box .clear-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #555577;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            display: none;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .search-box .clear-btn.visible {
            display: block;
        }

        .search-box .clear-btn:active {
            background: rgba(255, 255, 255, 0.05);
        }

        .counter-float {
            text-align: center;
            padding: 4px 0 12px;
            font-size: 0.8rem;
            color: #555577;
            letter-spacing: 0.3px;
        }

        .counter-float strong {
            color: #c4b5fd;
            font-weight: 600;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 14px;
            padding: 0 16px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .game-card {
            background: linear-gradient(145deg, rgba(26, 24, 51, 0.7), rgba(20, 18, 40, 0.9));
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(167, 139, 250, 0.06);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            cursor: default;
            position: relative;
        }

        .game-card:active {
            transform: scale(0.97);
            transition-duration: 0.1s;
        }

        .game-card .img-container {
            position: relative;
            width: 100%;
            aspect-ratio: 2/3;
            overflow: hidden;
            background: #12101f;
        }

        .game-card .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .game-card:active .img-container img {
            transform: scale(1.04);
        }

        .game-card .img-container .fallback {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1833, #12101f);
            color: #555577;
            font-size: 2.5rem;
            flex-direction: column;
            gap: 8px;
            text-align: center;
            padding: 16px;
        }

        .game-card .img-container .fallback span {
            font-size: 0.65rem;
            font-weight: 400;
            color: #444466;
            max-width: 90%;
            word-break: break-word;
            line-height: 1.3;
        }

        .game-card .img-container img.error + .fallback {
            display: flex;
        }

        .game-card .img-container img.error {
            display: none;
        }

        .game-card .platform-badge {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(15, 14, 26, 0.8);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 8px;
            padding: 2px 10px;
            font-size: 0.55rem;
            font-weight: 600;
            color: #a78bfa;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 0.5px solid rgba(167, 139, 250, 0.15);
        }

        .game-card .info {
            padding: 10px 12px 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .game-card .name {
            font-weight: 600;
            font-size: 0.8rem;
            line-height: 1.3;
            color: #e8e8f0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.6rem;
        }

        .game-card .screenshot-wrap {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 10px;
            overflow: hidden;
            background: #0a0914;
            margin-top: 4px;
            border: 0.5px solid rgba(167, 139, 250, 0.06);
            position: relative;
        }

        .game-card .screenshot-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease;
        }

        .game-card .screenshot-wrap .screenshot-fallback {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            color: #333355;
            font-size: 1.8rem;
            background: #0a0914;
        }

        .game-card .screenshot-wrap img.error + .screenshot-fallback {
            display: flex;
        }

        .game-card .screenshot-wrap img.error {
            display: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #555577;
            grid-column: 1 / -1;
        }

        .empty-state .emoji {
            font-size: 3.5rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            color: #8888aa;
            font-weight: 400;
            font-size: 1.1rem;
        }

        .empty-state p {
            font-size: 0.85rem;
            margin-top: 6px;
            opacity: 0.6;
        }

        @media (max-width: 420px) {
            .game-grid {

                gap: 10px;
                padding: 0 12px 16px;

            .header h1 {

            }
            .header {

            .search-wrapper {

                border-radius: 14px;
            }
            .game-card .name {

                min-height: 2.2rem;
            }
            .game-card .info {
                padding: 8px 10px 10px;
            }
            .game-card .platform-badge {
                font-size: 0.45rem;
                padding: 1px 8px;
                bottom: 5px;
                left: 5px;
            }
        }

        @media (min-width: 600px) {
            .game-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 18px;
                max-width: 800px;

            }
            .game-card {
                border-radius: 22px;
            }
            .game-card .name {
                font-size: 0.9rem;
            }
            .header h1 {
                font-size: 2rem;
            }
            .search-wrapper {
                padding: 0 24px 20px;
            }
            .search-box input {
                padding: 16px 20px 16px 52px;
                font-size: 1.05rem;
                border-radius: 18px;
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-card {
            animation: fadeUp 0.4s ease both;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #333355;
            border-radius: 10px;
        }

        function getCoverImage(gameName) {

            // Lista de IDs de Steam conocidos para juegos populares

            // Si tenemos el ID, usamos la imagen de Steam
            const id = steamIds[clean];
            if (id) {
                return `https://steamcdn-a.akamaihd.net/steam/apps/${id}/header.jpg`;
            }

            // Si no, intentamos con una búsqueda genérica
            return `https://steamcdn-a.akamaihd.net/steam/apps/${Math.abs(hashCode(gameName) % 90000 + 10000)}/header.jpg`;
        }

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash);
        }

        function getScreenshotImage(gameName) {
            const hash = hashCode(gameName);
            const appId = 10000 + (hash % 90000);
            const ssId = 100000 + (hash % 899999);
            return `https://steamcdn-a.akamaihd.net/steam/apps/${appId}/ss_${ssId}.jpg`;
        }

            const count = filtered.length;
            document.getElementById('gameCount').textContent = games.length;
            document.getElementById('resultCount').innerHTML =
                `Mostrando <strong>${count}</strong> ${count === 1 ? 'resultado' : 'resultados'}`;

            if (filtered.length === 0) {

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const query = searchInput.value.trim();
                currentFilter = query;
                renderGames(query);
                clearBtn.classList.toggle('visible', query.length > 0);
            }, 200);
        }

            searchInput.value = '';
