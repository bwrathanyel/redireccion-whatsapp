<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectando con tu asesor...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        .btn { padding: 15px 30px; background: #25D366; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <p>Redirigiendo a WhatsApp...</p>
    <a href="#" id="link" class="btn">Abrir WhatsApp</a>
    
    <script>
        // Pool de asesores. peso = probabilidad relativa (mismo criterio que ya se
        // usaba con numeros duplicados, ahora explicito y con nombre -- ver skill
        // web-lead-ingest y decisions/log.md 2026-07-09).
        const ASESORES = [
            { nombre: 'Ambar Arévalo', telefono: '584244900601', peso: 3 },
            { nombre: 'Nicoll Osorio', telefono: '584127136169', peso: 2 },
            { nombre: 'Eudys Chourio', telefono: '584147020527', peso: 1 },
            { nombre: 'Arquímedes Arévalo', telefono: '584128905774', peso: 1 },
            { nombre: 'Luis Rueda', telefono: '584244269876', peso: 1 },
            { nombre: 'Andric Arévalo', telefono: '584140415685', peso: 1 }
        ];
        function elegirAsesor() {
            const total = ASESORES.reduce((s, a) => s + a.peso, 0);
            let r = Math.random() * total, acumulado = 0;
            for (const a of ASESORES) { acumulado += a.peso; if (r < acumulado) return a; }
            return ASESORES[ASESORES.length - 1];
        }
        const elegido = elegirAsesor().telefono;
        const mensaje = "¡Buenas!, Vengo de Instagram me gustaría más información 😊";
        const urlFinal = "https://wa.me/" + elegido + "?text=" + encodeURIComponent(mensaje);
        
        document.getElementById('link').href = urlFinal;
        window.location.href = urlFinal;
    </script>
</body>
</html>
