<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080b16">
<meta name="robots" content="noindex, nofollow">
<title>Sin conexión · Destino y Eventos Lotus 360 CRM</title>
<link rel="icon" href="icons/icon-192.png">
<style>
:root{--bg:#080b16;--panel:#141a30;--line:rgba(255,255,255,.1);--txt:#eef1f8;--muted:#8b93ad;--accent:#ff9100}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.card{max-width:360px;width:100%;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:36px 28px}
.card img{width:56px;height:56px;border-radius:14px;border:2px solid var(--accent);padding:3px;background:#fff;object-fit:contain;margin-bottom:18px}
.card i{font-size:34px;color:var(--muted);margin-bottom:14px;display:block}
h1{font-size:18px;font-weight:700;margin-bottom:8px}
p{font-size:13.5px;color:var(--muted);line-height:1.5;margin-bottom:22px}
button{width:100%;background:linear-gradient(135deg,var(--accent),#e0570a);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit}
button:active{transform:scale(.98)}
</style>
</head>
<body>
<div class="card">
  <img src="logolotus-integrado.png" alt="Destino y Eventos Lotus 360" width="56" height="56">
  <h1>Sin conexión</h1>
  <p>No se pudo cargar esta página. Revisa tu conexión a internet e intenta de nuevo — lo ya visitado sigue disponible offline.</p>
  <button onclick="location.reload()">Reintentar</button>
</div>
</body>
</html>
