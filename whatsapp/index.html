<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectando con tu asesor...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            background: #0a0a0a;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top: 4px solid #25D366;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            padding: 15px 30px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            margin: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader"></div>
    <p id="mensaje">Conectando con tu asesor...</p>
    <a href="#" id="link" class="btn" style="display:none;">📱 Abrir WhatsApp</a>
    
    <script>
        // Pool de asesores. peso = probabilidad relativa (mismo criterio que ya se
        // usaba con numeros duplicados, ahora explicito y con nombre -- ver skill
        // web-lead-ingest y decisions/log.md 2026-07-09).
        const ASESORES = [
            { nombre: 'Ambar Arévalo', telefono: '584244900601', peso: 3 },
            { nombre: 'Nicoll Osorio', telefono: '584127136169', peso: 2 },
            { nombre: 'Eudys Chourio', telefono: '584147020527', peso: 1 },
            { nombre: 'Arquímedes Arévalo', telefono: '584128905774', peso: 1 },
            { nombre: 'Luis Rueda', telefono: '584244269876', peso: 1 },
            { nombre: 'Andric Arévalo', telefono: '584140415685', peso: 1 }
        ];
        function elegirAsesor() {
            const total = ASESORES.reduce((s, a) => s + a.peso, 0);
            let r = Math.random() * total, acumulado = 0;
            for (const a of ASESORES) { acumulado += a.peso; if (r < acumulado) return a; }
            return ASESORES[ASESORES.length - 1];
        }
        const mensajeAleatorio = "¡Buenas!, Vengo de Instagram me gustaría más información 😊";

        function obtenerParametro(nombre) {
            var urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(nombre) || '';
        }
        
        var numero = obtenerParametro('numero');
        var nombre = obtenerParametro('nombre');
        var destino = obtenerParametro('destino');
        var asesor = obtenerParametro('asesor');
        
        // MODO ALEATORIZADOR (sin parámetros)
        if (!numero && !nombre && !destino && !asesor) {
            var elegido = elegirAsesor().telefono;
            var urlFinal = "https://wa.me/" + elegido + "?text=" + encodeURIComponent(mensajeAleatorio);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('mensaje').textContent = 'Conectando con un asesor...';
            document.getElementById('mensaje').style.color = '#25D366';
            setTimeout(function() {
                window.location.href = urlFinal;
            }, 500);
        }
        // MODO ASESOR (con parámetros)
        else {
            // Avisar al script para registrar atención
            if (nombre && asesor) {
                fetch('https://script.google.com/macros/s/AKfycbyO-Su3f4yOH_ElwHW0UU6woORiLDxdkoFecLYga-zrNei5jBEP9iV2oIi1wVZDggaVVQ/exec?accion=whatsapp_directo&nombre=' + encodeURIComponent(nombre) + '&destino=' + encodeURIComponent(destino) + '&asesor=' + encodeURIComponent(asesor));
            }
            
            // Redirigir a WhatsApp
           var mensajeWA = "";
if (nombre && destino) {
    mensajeWA = "?text=" + encodeURIComponent("Hola! Vengo de Instagram. Mi nombre es " + nombre + " y me gustaria informacion para viajar a " + destino);
}
var urlFinal = "https://wa.me/" + numero + mensajeWA;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('mensaje').textContent = '✅ Conectando con WhatsApp...';
            document.getElementById('mensaje').style.color = '#25D366';
            
            setTimeout(function() {
                window.location.href = urlFinal;
            }, 800);
        }
    </script>
</body>
</html>
